<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Title -->
    <title>FreshMart - Online Grocery Store</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="FreshMart is an online grocery store where you can buy fresh fruits, vegetables, dairy products and daily essentials quickly and easily."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="FreshMart, online grocery, fruits, vegetables, dairy, grocery store, fresh food delivery"
    />

    <!-- Author -->
    <meta name="author" content="FreshMart" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#198754" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Open Graph (for social media preview) -->
    <meta property="og:title" content="FreshMart - Online Grocery Store" />
    <meta
      property="og:description"
      content="Buy fresh fruits, vegetables and groceries online from FreshMart."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />

    <!-- Bootstrap JS -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
